<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Original artwork for this project — a stylized monk-scholar icon, matching
       agnus-dei.svg's circular-badge format. Not based on any existing image. -->

  <!-- Outer circle (parchment badge, same format as agnus-dei.svg) -->
  <circle cx="60" cy="60" r="56" fill="#fdf7e8" stroke="#1e3a8a" stroke-width="3"/>

  <!-- Halo -->
  <circle cx="60" cy="38" r="15" fill="none" stroke="#f5c014" stroke-width="2" opacity="0.85"/>

  <!-- Hooded robe (cowl) -->
  <path
    d="M60 30
       C 46 30 36 42 36 58
       L 34 92
       C 34 96 37 98 41 98
       L 79 98
       C 83 98 86 96 86 92
       L 84 58
       C 84 42 74 30 60 30 Z"
    fill="#1e3a8a"
  />

  <!-- Inner robe shading (a fold down the middle) -->
  <path d="M60 34 L 60 96" stroke="#112252" stroke-width="1.5" opacity="0.5"/>

  <!-- Face opening -->
  <ellipse cx="60" cy="52" rx="13" ry="14" fill="#f0c98a"/>

  <!-- Simple grey beard, behind the face features -->
  <path d="M48 56 Q48 74 60 78 Q72 74 72 56 Q66 64 60 64 Q54 64 48 56 Z" fill="#e2e2e2"/>

  <!-- Simple face: closed, peaceful eyes and a gentle smile -->
  <path d="M53 50 q 2 -2 4 0" stroke="#1e3a8a" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M63 50 q 2 -2 4 0" stroke="#1e3a8a" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M55 58 q 5 4 10 0" stroke="#1e3a8a" stroke-width="1.6" stroke-linecap="round" fill="none"/>

  <!-- Hands holding an open book -->
  <rect x="46" y="80" width="28" height="18" rx="2" fill="#fdf7e8" stroke="#a07840" stroke-width="1.5"/>
  <line x1="60" y1="80" x2="60" y2="98" stroke="#a07840" stroke-width="1.2"/>
  <line x1="49" y1="85" x2="57" y2="84" stroke="#c9b98a" stroke-width="1"/>
  <line x1="49" y1="90" x2="57" y2="89" stroke="#c9b98a" stroke-width="1"/>
  <line x1="63" y1="84" x2="71" y2="85" stroke="#c9b98a" stroke-width="1"/>
  <line x1="63" y1="89" x2="71" y2="90" stroke="#c9b98a" stroke-width="1"/>

  <!-- Rope belt -->
  <path d="M42 84 Q60 90 78 84" stroke="#c8a96e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>

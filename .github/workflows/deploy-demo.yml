name: Deploy demo to GitHub Pages

on:
  push:
    branches:
      - claude/clean-project-clone-s216ne
      - main
    paths:
      - 'scripts/build_github_pages_redirect.sh'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build redirect stubs
        # GitHub Pages no longer serves a live copy of the site — it's now
        # just a redirect to the canonical Cloudflare deployment, so old
        # links and bookmarks still land somewhere real instead of a stale
        # or missing copy. See scripts/build_github_pages_redirect.sh and
        # docs/DEMO_HOSTING.md's "GitHub Pages now redirects" section.
        run: bash scripts/build_github_pages_redirect.sh
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: publish

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

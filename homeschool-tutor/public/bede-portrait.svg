<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300" fill="none">
  <!-- Original artwork for this project — a shaded portrait-bust illustration of
       Bede, not based on any existing image. Vector, so it renders crisply at any
       size/resolution on any display. -->
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#fdf7e8"/>
      <stop offset="100%" stop-color="#f0e8d0"/>
    </radialGradient>
    <linearGradient id="robeShade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#274a9e"/>
      <stop offset="55%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#112252"/>
    </linearGradient>
    <linearGradient id="hoodInner" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#0b1636"/>
      <stop offset="100%" stop-color="#17306e"/>
    </linearGradient>
    <radialGradient id="skinShade" cx="42%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f4cd9c"/>
      <stop offset="70%" stop-color="#e0af7a"/>
      <stop offset="100%" stop-color="#c9925f"/>
    </radialGradient>
    <linearGradient id="beardShade" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#e8e8e4"/>
      <stop offset="100%" stop-color="#c4c4bc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="240" height="300" fill="url(#bgGlow)"/>

  <!-- Halo, softly behind the hood -->
  <ellipse cx="120" cy="88" rx="58" ry="58" fill="none" stroke="#f5c014" stroke-width="3" opacity="0.55"/>
  <ellipse cx="120" cy="88" rx="58" ry="58" fill="#f9d54a" opacity="0.08"/>

  <!-- Shoulders / robe -->
  <path d="M30 300 L38 210 C 44 178 70 160 120 160 C 170 160 196 178 202 210 L210 300 Z" fill="url(#robeShade)"/>
  <!-- Robe fold shading -->
  <path d="M120 165 L118 300" stroke="#0b1636" stroke-width="2" opacity="0.35"/>
  <path d="M85 175 Q 80 230 88 300" stroke="#0b1636" stroke-width="1.5" opacity="0.25" fill="none"/>
  <path d="M155 175 Q 160 230 152 300" stroke="#0b1636" stroke-width="1.5" opacity="0.25" fill="none"/>

  <!-- Hood, framing the face -->
  <path
    d="M120 40
       C 78 40 58 74 60 112
       C 61 140 70 158 82 170
       L 76 190 C 100 178 140 178 164 190 L 158 170
       C 170 158 179 140 180 112
       C 182 74 162 40 120 40 Z"
    fill="url(#hoodInner)"
  />

  <!-- Face -->
  <ellipse cx="120" cy="120" rx="42" ry="50" fill="url(#skinShade)"/>

  <!-- Cheekbone / age shading -->
  <path d="M84 110 Q 90 140 100 155" stroke="#b98a5c" stroke-width="3" opacity="0.35" stroke-linecap="round" fill="none"/>
  <path d="M156 110 Q 150 140 140 155" stroke="#b98a5c" stroke-width="3" opacity="0.35" stroke-linecap="round" fill="none"/>
  <!-- Forehead lines -->
  <path d="M96 88 Q120 82 144 88" stroke="#b98a5c" stroke-width="1.4" opacity="0.4" fill="none"/>
  <path d="M98 96 Q120 90 142 96" stroke="#b98a5c" stroke-width="1.2" opacity="0.35" fill="none"/>

  <!-- Eyebrows -->
  <path d="M96 108 Q104 101 113 106" stroke="#7a7a7a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M127 106 Q136 101 144 108" stroke="#7a7a7a" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Eyes: warm, kind, slightly downturned in gentle focus -->
  <path d="M99 116 Q106 112 114 116" stroke="#3a2a1c" stroke-width="2" stroke-linecap="round" fill="none"/>
  <circle cx="107" cy="117" r="2.4" fill="#3a2a1c"/>
  <path d="M126 116 Q134 112 141 116" stroke="#3a2a1c" stroke-width="2" stroke-linecap="round" fill="none"/>
  <circle cx="133" cy="117" r="2.4" fill="#3a2a1c"/>
  <!-- Under-eye age lines -->
  <path d="M100 123 Q107 126 114 123" stroke="#b98a5c" stroke-width="1" opacity="0.4" fill="none"/>
  <path d="M126 123 Q133 126 140 123" stroke="#b98a5c" stroke-width="1" opacity="0.4" fill="none"/>

  <!-- Nose -->
  <path d="M120 118 L116 142 Q120 147 124 142" stroke="#b98a5c" stroke-width="1.6" opacity="0.6" fill="none" stroke-linecap="round"/>

  <!-- Gentle smile -->
  <path d="M104 152 Q120 162 136 152" stroke="#8a5a3c" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <path d="M104 152 Q108 156 112 155" stroke="#8a5a3c" stroke-width="1" opacity="0.5" fill="none"/>
  <path d="M136 152 Q132 156 128 155" stroke="#8a5a3c" stroke-width="1" opacity="0.5" fill="none"/>

  <!-- Beard, shaped and shaded -->
  <path
    d="M82 145
       C 80 175 92 200 120 206
       C 148 200 160 175 158 145
       C 148 162 136 170 120 170
       C 104 170 92 162 82 145 Z"
    fill="url(#beardShade)"
  />
  <path d="M100 158 Q120 168 140 158" stroke="#a8a8a0" stroke-width="1" opacity="0.5" fill="none"/>
  <path d="M96 172 Q120 184 144 172" stroke="#a8a8a0" stroke-width="1" opacity="0.4" fill="none"/>

  <!-- Soft hood shadow over the brow (not a hard line — low opacity, feathered) -->
  <path d="M76 100 Q120 72 164 100" stroke="#0b1636" stroke-width="14" opacity="0.22" fill="none" stroke-linecap="round"/>
  <path d="M80 92 Q120 68 160 92" stroke="#0b1636" stroke-width="5" opacity="0.35" fill="none" stroke-linecap="round"/>

  <!-- Hands holding an open book -->
  <rect x="90" y="228" width="60" height="34" rx="3" fill="#fdf7e8" stroke="#8a6a3c" stroke-width="1.8"/>
  <line x1="120" y1="228" x2="120" y2="262" stroke="#8a6a3c" stroke-width="1.3"/>
  <line x1="96" y1="238" x2="114" y2="236" stroke="#c9b98a" stroke-width="1"/>
  <line x1="96" y1="246" x2="114" y2="244" stroke="#c9b98a" stroke-width="1"/>
  <line x1="96" y1="254" x2="114" y2="252" stroke="#c9b98a" stroke-width="1"/>
  <line x1="126" y1="236" x2="144" y2="238" stroke="#c9b98a" stroke-width="1"/>
  <line x1="126" y1="244" x2="144" y2="246" stroke="#c9b98a" stroke-width="1"/>
  <line x1="126" y1="252" x2="144" y2="254" stroke="#c9b98a" stroke-width="1"/>
  <!-- Fingers -->
  <path d="M92 262 Q88 250 96 240" stroke="url(#skinShade)" stroke-width="9" stroke-linecap="round" fill="none"/>
  <path d="M148 262 Q152 250 144 240" stroke="url(#skinShade)" stroke-width="9" stroke-linecap="round" fill="none"/>

  <!-- Rope belt hint at the base of the robe near the book -->
  <path d="M60 222 Q120 236 180 222" stroke="#c8a96e" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9"/>
</svg>

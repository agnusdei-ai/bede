name: Keep demo backend warm

# Render's free web-service plan (render.yaml) spins the container down
# after 15 minutes with no inbound traffic, and the next visitor eats a
# ~1-minute cold boot (import the full dependency set, run
# homeschool-api/main.py's lifespan: create_tables() + the ~1.5s PBKDF2
# encryption-key derivation). This pings /health often enough that a
# demo visitor never hits that cold boot during the covered window.
#
# Deliberately NOT 24/7: Render's free plan grants a shared 750
# instance-hours/month across the whole workspace, and keeping one
# service warm around the clock burns ~744 of those in a 31-day month by
# itself — zero headroom for bede-demo-db or any other free service
# before the workspace gets suspended for the rest of the month. The
# window below (12:00-23:50 UTC, ~12h/day) costs roughly half that,
# leaving real headroom. Widen the `12-23` hour range below if demo
# traffic falls outside it, or drop this workflow entirely and upgrade
# bede-demo-api to Render's paid Starter plan (~$7/mo, no spin-down,
# no shared-hours ceiling) for true 24/7 coverage instead.
on:
  schedule:
    - cron: '*/10 12-23 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the demo API's health endpoint
        env:
          DEMO_API_BASE: ${{ vars.VITE_DEMO_API_BASE }}
        run: |
          if [ -z "$DEMO_API_BASE" ]; then
            echo "VITE_DEMO_API_BASE repo variable is not set yet — nothing to ping."
            exit 0
          fi
          # Strip a trailing slash — same fix as demo/src/api.ts's apiBase(),
          # since VITE_DEMO_API_BASE is shared with that build and a stray
          # trailing slash here produces ".../onrender.com//health", which
          # this FastAPI backend's router won't match.
          curl -sf --max-time 90 "${DEMO_API_BASE%/}/health"

  # TEMPORARY diagnostic job — not part of the real keep-alive fix. Exercises
  # the exact demo-code -> login -> /tutor/chat flow the real frontend uses,
  # to see the raw response for the "Bede doesn't respond" report, since this
  # sandbox can't reach onrender.com directly. Remove before merging.
  debug-chat-flow:
    runs-on: ubuntu-latest
    steps:
      - name: Run the real demo flow and dump the raw /tutor/chat response
        env:
          DEMO_API_BASE: ${{ vars.VITE_DEMO_API_BASE }}
        run: |
          set -x
          BASE="${DEMO_API_BASE%/}"
          CODE=$(curl -sS --max-time 90 -X POST "$BASE/auth/demo-code" | tee /dev/stderr | jq -r '.code')
          TOKEN=$(curl -sS --max-time 30 -X POST "$BASE/auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"role\":\"demo_code\",\"credential\":\"$CODE\"}" | tee /dev/stderr | jq -r '.access_token')
          CONFIG=$(curl -sS --max-time 30 "$BASE/tutor/demo-config" -H "Authorization: Bearer $TOKEN")
          echo "demo-config: $CONFIG"
          BODY=$(jq -n --argjson cfg "$CONFIG" '{session_config: $cfg, current_subject: "living_books", conversation_history: [], child_message: "[START]", drawing_image: null}')
          echo "--- raw /tutor/chat response (status + headers + body) ---"
          curl -sS --max-time 60 -D - -X POST "$BASE/tutor/chat" \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer $TOKEN" \
            -d "$BODY"
          echo "--- end response ---"

  # TEMPORARY — same caveat as debug-chat-flow above. requirements.txt pins
  # anthropic and sse-starlette with open-ended `>=` floors and no ceiling,
  # so `pip install -r requirements.txt` resolves to whatever's newest at
  # build time. Render rebuilds from scratch on every push to main — and we
  # just merged two PRs — so check what actually gets resolved today and
  # whether it explains the malformed "data: data: ..." double-prefix seen
  # in debug-chat-flow's output.
  debug-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install anthropic + sse-starlette fresh and inspect them
        run: |
          pip install --quiet 'anthropic>=0.40.0' 'sse-starlette>=2.1.0' fastapi
          echo "--- resolved versions ---"
          pip show anthropic sse-starlette | grep -E '^(Name|Version):'
          echo "--- does EventSourceResponse double-wrap an already-formatted string? ---"
          python3 <<'PYEOF'
          import asyncio
          from sse_starlette.sse import EventSourceResponse

          async def gen():
              yield 'data: {"type": "done"}\n\n'

          resp = EventSourceResponse(gen())

          async def drain():
              chunks = []
              async for chunk in resp.body_iterator:
                  chunks.append(chunk)
                  if len(chunks) > 5:
                      break
              print("RAW OUTPUT:", repr(chunks))

          asyncio.run(drain())
          PYEOF
          echo "--- anthropic streaming event/delta class names in this version ---"
          python3 -c "
          import anthropic
          print('anthropic version:', anthropic.__version__)
          import anthropic.lib.streaming._messages as m
          print([n for n in dir(m) if 'Event' in n or 'Delta' in n])
          print('--- MessageStream class attrs ---')
          print([n for n in dir(m.MessageStream) if not n.startswith('_')])
          print('--- TextEvent fields ---')
          print(getattr(m.TextEvent, 'model_fields', None))
          print('--- InputJsonEvent fields ---')
          print(getattr(m.InputJsonEvent, 'model_fields', None))
          print('--- raw event types (anthropic.types) ---')
          import anthropic.types as t
          print([n for n in dir(t) if 'Event' in n or 'Delta' in n])
          "
          echo "--- FIXED pattern: plain json.dumps(), no manual data: framing ---"
          pip install --quiet uvicorn
          cat > /tmp/testapp2.py <<'PYEOF'
          import json
          from fastapi import FastAPI
          from sse_starlette.sse import EventSourceResponse

          app = FastAPI()

          @app.post("/tutor/chat")
          async def chat():
              async def event_generator():
                  yield json.dumps({'type': 'text', 'content': 'Hello there'})
                  yield json.dumps({'type': 'done'})
              return EventSourceResponse(event_generator(), media_type="text/event-stream")
          PYEOF
          (cd /tmp && python3 -m uvicorn testapp2:app --port 8124 > /tmp/uvicorn2.log 2>&1 &)
          sleep 3
          curl -sS -D - -X POST http://127.0.0.1:8124/tutor/chat
          echo "--- confirming event.type / event.delta.type against REAL installed anthropic wire-format types ---"
          python3 -c "
          from anthropic.types import RawContentBlockStartEvent, RawContentBlockDeltaEvent, RawContentBlockStopEvent

          start = RawContentBlockStartEvent.model_validate({'type': 'content_block_start', 'index': 0, 'content_block': {'type': 'text', 'text': ''}})
          print('start.type =', repr(start.type))

          delta = RawContentBlockDeltaEvent.model_validate({'type': 'content_block_delta', 'index': 0, 'delta': {'type': 'text_delta', 'text': 'Hi'}})
          print('delta.type =', repr(delta.type), 'delta.delta.type =', repr(delta.delta.type), 'delta.delta.text =', repr(delta.delta.text))

          tool_start = RawContentBlockStartEvent.model_validate({'type': 'content_block_start', 'index': 0, 'content_block': {'type': 'tool_use', 'id': 'toolu_1', 'name': 'offer_socratic_hint', 'input': {}}})
          print('tool_start.content_block.type =', repr(tool_start.content_block.type), 'id =', tool_start.content_block.id, 'name =', tool_start.content_block.name)

          json_delta = RawContentBlockDeltaEvent.model_validate({'type': 'content_block_delta', 'index': 0, 'delta': {'type': 'input_json_delta', 'partial_json': '{\"a\":1}'}})
          print('json_delta.delta.type =', repr(json_delta.delta.type), 'partial_json =', repr(json_delta.delta.partial_json))

          stop = RawContentBlockStopEvent.model_validate({'type': 'content_block_stop', 'index': 0})
          print('stop.type =', repr(stop.type))
          "

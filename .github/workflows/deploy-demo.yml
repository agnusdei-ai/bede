name: Deploy demo to GitHub Pages

on:
  push:
    branches:
      - claude/clean-project-clone-s216ne
      - main
    paths:
      - 'demo/**'
      - 'site/**'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: demo/package-lock.json
      - name: Install
        working-directory: demo
        run: npm ci
      - name: Build demo
        working-directory: demo
        # VITE_DEMO_API_BASE must point at a publicly-reachable homeschool-api
        # deployment with DEMO_PIN set (Settings -> Secrets and variables ->
        # Actions -> Variables -> New repository variable). Baked in at build
        # time since this is a static site — there is no server here to read
        # it from at runtime.
        env:
          VITE_DEMO_API_BASE: ${{ vars.VITE_DEMO_API_BASE }}
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

name: Deploy demo to GitHub Pages

on:
  push:
    branches:
      - claude/clean-project-clone-s216ne
      - main
    paths:
      - 'demo/**'
      - 'site/**'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: demo/package-lock.json
      - name: Build combined site (marketing page + demo)
        # Assembles site/ (the marketing home page) at the output root and
        # a fresh demo/dist build nested under /bede/ — the same publish/
        # layout scripts/build_pages_site.sh produces for Cloudflare, so
        # GitHub Pages and Cloudflare serve identical content. Runs npm ci
        # and npm run build internally; VITE_DEMO_API_BASE must point at a
        # publicly-reachable homeschool-api deployment with DEMO_PIN set
        # (Settings -> Secrets and variables -> Actions -> Variables) since
        # it's baked in at build time — there is no server here to read it
        # from at runtime.
        env:
          VITE_DEMO_API_BASE: ${{ vars.VITE_DEMO_API_BASE }}
        run: bash scripts/build_pages_site.sh
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: publish

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

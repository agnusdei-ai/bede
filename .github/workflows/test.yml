name: Backend regression tests

# Fast unit-level regression suite — runs on every push/PR so a broken PIN
# policy, a mis-wired voice fallback, etc. is caught before merge. The
# heavier "does the whole production stack actually boot" check lives in
# production-regression.yml since it needs a real Docker daemon and takes
# much longer.
on:
  push:
    branches: [main]
    paths:
      - 'homeschool-api/**'
      - 'scripts/setup_wizard/**'
      - 'scripts/trust_service/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'homeschool-api/**'
      - 'scripts/setup_wizard/**'
      - 'scripts/trust_service/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:

# No job here writes to the repo, comments on a PR, or creates a release —
# the default token only ever needs to check out code.
permissions:
  contents: read

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: homeschool-api
        run: pip install -r requirements-dev.txt
      - name: Audit dependencies for known vulnerabilities
        working-directory: homeschool-api
        # Complements dependabot.yml's weekly PRs with an immediate,
        # per-push/PR signal — fails the build the moment a dependency
        # (existing or newly added in this PR) has a known CVE, rather than
        # waiting for the next scheduled Dependabot run.
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
          pip-audit -r requirements-dev.txt
      - name: Run tests
        working-directory: homeschool-api
        run: python -m pytest tests/ -v

  demo-concurrency-test:
    # Separate from api-tests above (which stays fast/no-DB, per the comment
    # at the top of this file): boots a real uvicorn subprocess against a
    # real Postgres to exercise proxy-header handling at the ASGI-server
    # layer, which an in-process TestClient can't reach. See
    # tests/test_demo_concurrency.py for what this actually verifies — a
    # regression guard for the missing --proxy-headers trust that once let
    # every demo visitor collapse onto one shared rate-limit bucket.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bede_concurrency_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: homeschool-api
        run: pip install -r requirements-dev.txt
      - name: Run the demo concurrency scaling test
        working-directory: homeschool-api
        env:
          DEMO_CONCURRENCY_TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/bede_concurrency_test
        run: python -m pytest tests/test_demo_concurrency.py -v

  wizard-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: pip install pytest
      - name: Run tests
        working-directory: scripts/setup_wizard
        run: python -m pytest test_wizard.py -v

  trust-service-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest and segno
        run: pip install pytest segno
      - name: Run tests
        working-directory: scripts/trust_service
        run: python -m pytest test_trust_service.py -v

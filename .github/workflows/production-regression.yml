name: Production deployment regression

# Proves the self-hosted production path actually works end-to-end, using a
# real Docker daemon (this sandbox that built the local-Postgres option and
# the setup wizard had the Docker CLI but no daemon, so this is the first
# place either has actually been run, not just validated by config parsing).
#
# Runs on a schedule so it keeps proving this on an ongoing basis even when
# nobody's touched the code recently (catching base-image updates, Alpine
# package drift, etc.) — not just "worked once when it was written."
#
# Uses a throwaway ANTHROPIC_API_KEY — the app never validates it at
# startup (only when an actual chat request comes in), so this proves the
# stack boots and serves traffic without making any real, billable Claude
# API calls.
on:
  schedule:
    - cron: '0 13 * * 1'  # every Monday, 13:00 UTC
  push:
    branches: [main]
    paths:
      - 'docker-compose.yml'
      - 'Caddyfile'
      - 'homeschool-api/**'
      - 'homeschool-tutor/**'
      - 'scripts/setup_wizard/**'
      - 'scripts/trust_service/**'
      - 'setup.sh'
      - 'scripts/setup-gui-common.sh'
      - '.github/workflows/production-regression.yml'
  workflow_dispatch:

# No job here writes to the repo, comments on a PR, or creates a release —
# the default token only ever needs to check out code. Worth being
# explicit here specifically: this workflow both runs on push to main
# (where some org defaults grant read-write) and handles a real secret
# (CI_TEST_LICENSE_KEY below) — least-privilege scoping matters more than
# usual for this one.
permissions:
  contents: read

env:
  # A real, signed license — validly verifiable against core/licensing.py's
  # embedded PUBLIC_KEY_PEM, which is exactly why this is NOT safe to
  # commit as a plaintext value the way the throwaway ANTHROPIC_API_KEY
  # below is: unlike a fake API key, a valid LICENSE_KEY is worth real
  # money to whoever holds it (there's no revocation — anyone with the
  # string can license their own instance for free, forever, with a public
  # repo's git/PR history being exactly the kind of place that gets
  # scraped for exactly this). Stored as a GitHub Actions repository secret
  # instead — see docs/PRODUCTION_SETUP.md#licensing for how to (re)issue
  # one via scripts/issue_license.py; bounded to a multi-year trial expiry
  # rather than a perpetual core license, as defense in depth if it's ever
  # exposed some other way.
  CI_TEST_LICENSE_KEY: ${{ secrets.CI_TEST_LICENSE_KEY }}

jobs:
  compose-config-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate managed-DB mode
        run: |
          cat > .env <<EOF
          ANTHROPIC_API_KEY=test
          SECRET_KEY=test
          MASTER_SECRET=test
          PARENT_PASSWORD=test
          CHILD_PIN=602656
          DATABASE_URL=postgresql+asyncpg://user:pass@host/db
          LICENSE_KEY=${CI_TEST_LICENSE_KEY}
          EOF
          docker compose config --quiet
          # db service must NOT be included when the local-db profile isn't active
          test -z "$(docker compose config --services | grep '^db$')"
          # trust (the no-CLI tablet-onboarding page) has nothing to do with
          # DB choice — it must always be present either way
          docker compose config --services | grep -q '^trust$'
          rm .env
      - name: Validate local-DB mode
        run: |
          cat > .env <<EOF
          ANTHROPIC_API_KEY=test
          SECRET_KEY=test
          MASTER_SECRET=test
          PARENT_PASSWORD=test
          CHILD_PIN=602656
          DATABASE_URL=postgresql+asyncpg://sage:testpass@db:5432/bede
          COMPOSE_PROFILES=local-db
          POSTGRES_PASSWORD=testpass
          LICENSE_KEY=${CI_TEST_LICENSE_KEY}
          EOF
          docker compose config --quiet
          docker compose config --services | grep -q '^db$'
          rm .env
      - name: Validate no-Anthropic mode (local self-hosted provider only)
        # The actual point of removing docker-compose.yml's old
        # `ANTHROPIC_API_KEY:?required` — proves a family can configure
        # Bede with ONLY a self-hosted model and no cloud AI account at
        # all, not just that ANTHROPIC_API_KEY happens to be unset while
        # some other required var papers over it.
        run: |
          cat > .env <<EOF
          BEDE_ADAPTER_ORDER=local
          LOCAL_LLM_BASE_URL=http://gpu-box.lan:8000/v1
          SECRET_KEY=test
          MASTER_SECRET=test
          PARENT_PASSWORD=test
          CHILD_PIN=602656
          DATABASE_URL=postgresql+asyncpg://user:pass@host/db
          LICENSE_KEY=${CI_TEST_LICENSE_KEY}
          EOF
          docker compose config --quiet
          # Confirm the interpolated config genuinely carries no Anthropic
          # credential and does carry the local provider's — a config that
          # silently fell back to some other default would still pass a
          # bare `--quiet` check.
          docker compose config | grep -q 'ANTHROPIC_API_KEY: ""'
          docker compose config | grep -q 'LOCAL_LLM_BASE_URL: http://gpu-box.lan:8000/v1'
          rm .env

  wizard-end-to-end:
    runs-on: ubuntu-latest
    needs: compose-config-validation
    steps:
      - uses: actions/checkout@v4

      - name: Build the setup wizard image
        run: docker build -t bede-setup-wizard -f scripts/setup_wizard/Dockerfile .

      - name: Run the wizard and submit the setup form (local-DB path)
        run: |
          docker run --rm -d --name wizard -p 8765:8765 \
            -e HOST_LAN_IP=192.168.1.50 \
            -v "$(pwd)":/repo \
            --user "$(id -u):$(id -g)" \
            bede-setup-wizard
          for i in $(seq 1 20); do
            curl -sf http://localhost:8765/ >/dev/null && break
            sleep 0.5
          done
          curl -sf http://localhost:8765/ | grep -q "Let's set up Bede"

          curl -sf -X POST http://localhost:8765/submit \
            --data-urlencode "anthropic_key=sk-ant-ci-test-key" \
            --data-urlencode "db_choice=local" \
            --data-urlencode "parent_password=cipassword123" \
            --data-urlencode "child_pin=602656" \
            --data-urlencode "license_key=${CI_TEST_LICENSE_KEY}" \
            | grep -q "All set"

          # wizard.py signals success by exiting its own process — confirm
          # the container actually stops on its own within a few seconds,
          # exactly the signal the real launcher scripts wait on.
          for i in $(seq 1 20); do
            docker ps --filter "name=wizard" --filter "status=running" -q | grep -q . || break
            sleep 0.5
          done
          if docker ps --filter "name=wizard" --filter "status=running" -q | grep -q .; then
            echo "Wizard container did not exit after a successful submission"
            docker logs wizard || true
            exit 1
          fi

      - name: Verify the generated .env
        run: |
          test -f .env
          grep -q '^ANTHROPIC_API_KEY=sk-ant-ci-test-key$' .env
          grep -q '^COMPOSE_PROFILES=local-db$' .env
          grep -q '^POSTGRES_PASSWORD=' .env
          grep -q '^CHILD_PIN=602656$' .env
          grep -q "^LICENSE_KEY=${CI_TEST_LICENSE_KEY}\$" .env
          grep -q '@db:5432/bede$' .env
          [ "$(stat -c '%a' .env)" = "600" ]

      - name: Upload .env as an artifact for the next job
        uses: actions/upload-artifact@v7
        with:
          name: wizard-generated-env
          path: .env
          retention-days: 1
          # v4 excludes dotfiles by default — .env is exactly that, and
          # without this the upload silently succeeds with zero files
          # (a warning, not a failure), which only surfaces as a confusing
          # "artifact not found" in the NEXT job's download step.
          include-hidden-files: true

  full-stack-boot:
    runs-on: ubuntu-latest
    needs: wizard-end-to-end
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: wizard-generated-env

      - name: Start the full stack (as the wizard configured it)
        run: docker compose up -d --build

      - name: Wait for the API to become healthy
        run: |
          for i in $(seq 1 60); do
            if curl -skf https://localhost/api/health >/dev/null 2>&1; then
              echo "Healthy after $((i / 2))s"
              exit 0
            fi
            sleep 2
          done
          echo "API never became healthy. Diagnostics:"
          echo "--- docker compose ps ---"
          docker compose ps
          echo "--- curl -v https://localhost/api/health ---"
          curl -vsk https://localhost/api/health 2>&1 || true
          echo "--- curl -v https://localhost/ (through nginx directly, no /api prefix) ---"
          curl -vsk https://localhost/ 2>&1 || true
          echo "--- direct to api container's own port, bypassing nginx/caddy ---"
          docker compose exec -T api curl -sf http://localhost:8000/health 2>&1 || true
          echo "--- docker compose logs ---"
          docker compose logs
          exit 1

      - name: Confirm the license is ACTIVE, not just that the app booted
        # /health is deliberately on the license gate's allowlist
        # (core/middleware.py's LicenseGateMiddleware), so ever since an
        # unlicensed production instance started booting into gated mode
        # instead of refusing to start, a healthy /health alone can no
        # longer prove CI_TEST_LICENSE_KEY is still valid — an expired
        # secret would sail through the health check while the instance
        # sat gated. This step closes that gap: a gated instance answers
        # every non-allowlisted path with a license_required 403 before
        # auth even runs, so a normal auth-shaped 401 here proves the gate
        # is NOT up (and therefore the license verified and is unexpired).
        run: |
          body=$(curl -sk https://localhost/api/pod/configs)
          code=$(curl -sk -o /dev/null -w '%{http_code}' https://localhost/api/pod/configs)
          if echo "$body" | grep -q 'license_required'; then
            echo "Instance is GATED — CI_TEST_LICENSE_KEY is missing/invalid/expired."
            echo "Reissue it (scripts/issue_license.py --tier trial --days 730 ...) and"
            echo "update the CI_TEST_LICENSE_KEY repository secret."
            echo "Response: $body"
            exit 1
          fi
          if [ "$code" != "401" ] && [ "$code" != "403" ]; then
            echo "Expected an auth-shaped 401/403 from an unauthenticated /pod/configs, got $code"
            echo "Response: $body"
            exit 1
          fi
          echo "License gate is down (auth answered normally) — license is active."

      - name: Confirm the no-CLI tablet-trust page works end-to-end
        run: |
          ok=true

          # Plain HTTP, not redirected — a new device hasn't trusted the
          # cert yet, so this must stay reachable without HTTPS. curl -f
          # swallows the actual status code on failure, so capture it
          # explicitly with -w instead of relying on -f's pass/fail alone —
          # cost real debugging time the first time this failed silently.
          bare_code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost/trust)
          if [ "$bare_code" != "302" ]; then
            echo "Expected 302 (redirect to /trust/) from bare /trust, got $bare_code"; ok=false
          fi

          index_code=$(curl -sL -o index.html -w '%{http_code}' http://localhost/trust)
          if [ "$index_code" != "200" ] || ! grep -q "Add a tablet to Bede" index.html; then
            echo "Expected 200 + instructions page from /trust (following redirect), got $index_code"; ok=false
          fi

          qr_code=$(curl -s -o qr.svg -w '%{http_code}' http://localhost/trust/qr.svg)
          if [ "$qr_code" != "200" ] || ! grep -q "<svg" qr.svg; then
            echo "Expected 200 + svg from /trust/qr.svg, got $qr_code"; ok=false
          fi

          cert_code=$(curl -s -o downloaded-root-ca.crt -w '%{http_code}' http://localhost/trust/root-ca.crt)
          docker compose exec -T caddy cat /data/caddy/pki/authorities/local/root.crt > actual-root-ca.crt
          if [ "$cert_code" != "200" ] || ! diff -q downloaded-root-ca.crt actual-root-ca.crt >/dev/null; then
            echo "Expected 200 + matching cert from /trust/root-ca.crt, got $cert_code"; ok=false
          fi

          # Guard against a regression that accidentally turns off the
          # HTTPS redirect for everything else while adding the /trust
          # exception (handle-block ordering is easy to get backwards).
          redirect_code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost/)
          if [ "$redirect_code" != "301" ] && [ "$redirect_code" != "308" ]; then
            echo "Expected a redirect for http://localhost/, got $redirect_code"; ok=false
          fi

          if [ "$ok" = "false" ]; then
            echo "--- docker compose ps ---"
            docker compose ps
            echo "--- curl -v http://localhost/trust ---"
            curl -v http://localhost/trust 2>&1 || true
            echo "--- curl -v http://localhost/trust/ ---"
            curl -v http://localhost/trust/ 2>&1 || true
            echo "--- trust container: is it actually listening on 8080? ---"
            docker compose exec -T trust python3 -c "import urllib.request; print(urllib.request.urlopen('http://localhost:8080/', timeout=3).status)" 2>&1 || true
            echo "--- docker compose logs trust caddy ---"
            docker compose logs trust caddy
            exit 1
          fi

      - name: Confirm local Postgres backup/restore works
        run: |
          make db-backup
          ls backups/*.sql
          BACKUP_FILE=$(ls -t backups/*.sql | head -1)
          make db-restore FILE="$BACKUP_FILE"
          # restart so the API re-reads a freshly-restored DB cleanly
          docker compose restart api
          for i in $(seq 1 30); do
            curl -skf https://localhost/api/health >/dev/null 2>&1 && exit 0
            sleep 2
          done
          echo "API did not come back healthy after a db-restore"
          exit 1

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

# Bede's license checkout + automated distribution Worker.
#
# See docs/CHECKOUT_SETUP.md at the repo root for the full one-time setup
# walkthrough (Cloudflare account, D1 database, Helcim account, secrets) —
# including a "VERIFY BEFORE LAUNCH" list of Helcim API details that
# couldn't be confirmed against a live account from this sandbox.
#
# This is deliberately a SEPARATE deployment from the product itself
# (homeschool-api/) — the self-hosted product stays phone-home-free by
# design (core/licensing.py verifies offline); this Worker exists purely to
# take payment, mint a license the same way scripts/issue_license.py would,
# and email it — a family's own Bede instance never talks to this or any
# other Anthropic/Cloudflare/Helcim service after it's licensed.

name = "bede-checkout"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "LICENSES_DB"
database_name = "bede-licenses"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"   # `wrangler d1 create bede-licenses` prints this

# ── Non-secret configuration ────────────────────────────────────────────────
[vars]
# CORS — the origin(s) your marketing/checkout page is served from. A
# browser's CORS Origin header is always scheme://host[:port] with no path.
ALLOWED_ORIGIN = "https://agnusdei.ai"
CURRENCY = "USD"
# Pricing lives here (not in a payment-processor dashboard, unlike Stripe
# Price IDs) — cents, so it's exact. Update and redeploy to change pricing.
CORE_PRICE_CENTS = "14900"          # $149 — one-time, up to CORE_SEATS students
COOP_PRICE_PER_SEAT_CENTS = "1900"  # $19/seat — one-time, buyer picks seat count
# Default seat count baked into a core-tier purchase (matches the product's
# existing 10-student pod cap).
CORE_SEATS = "10"
# Self-serve trial terms.
TRIAL_DAYS = "21"
TRIAL_SEATS = "10"
# "From" address for license delivery emails — must be a sender verified
# against a domain in your Resend account.
RESEND_FROM_ADDRESS = "Bede <licenses@agnusdei.ai>"

# ── Secrets — set with `wrangler secret put <NAME>`, never written here ────
# LICENSE_SIGNING_PRIVATE_KEY_PEM   The Ed25519 private key from
#                                   homeschool-api/scripts/generate_license_keypair.py,
#                                   full PEM text (BEGIN/END lines included).
#                                   Anyone with this can mint valid licenses —
#                                   set it directly with `wrangler secret put`,
#                                   never in a file that touches this repo.
# HELCIM_API_TOKEN                  Helcim dashboard → Integrations → API
#                                   Access Configuration.
# HELCIM_WEBHOOK_VERIFIER_TOKEN      Helcim dashboard → webhook settings, once
#                                   you've created the webhook pointing at
#                                   this Worker's /webhook/helcim.
# RESEND_API_KEY                    Same Resend account the product itself
#                                   can use, or a separate key — your choice.
# ADMIN_TOKEN                        A random string you generate yourself
#                                   (e.g. `openssl rand -hex 32`) — required
#                                   as a Bearer token on GET /admin/licenses.

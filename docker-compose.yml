# ── Bede Homeschool Tutor — secure deployment ─────────────────────────────────
#
# Required env vars (set in .env or shell — never hardcoded here):
#   ANTHROPIC_API_KEY   Claude API key
#   SECRET_KEY          JWT signing key   (openssl rand -hex 32)
#   MASTER_SECRET       Encryption master secret (openssl rand -hex 32)
#   PARENT_PASSWORD     Parent login password
#   CHILD_PIN           Child login PIN
#   DATABASE_URL        PostgreSQL connection string — see "Storage model" below
#
# Storage model — two options, see docs/PRODUCTION_SETUP.md:
#   1. Managed Postgres (Neon/Supabase/etc., the original default) — nothing
#      to run yourself, automatic backups, but an external account and your
#      encrypted data leaves this machine for their cloud.
#        DATABASE_URL=postgresql+asyncpg://user:pass@host/db?ssl=require
#   2. Local Postgres (the `db` service below) — zero external accounts,
#      nothing leaves this machine, but backups are your responsibility (see
#      `make db-backup`). Enabled by setting in .env:
#        COMPOSE_PROFILES=local-db
#        POSTGRES_PASSWORD=<openssl rand -hex 24>
#        DATABASE_URL=postgresql+asyncpg://sage:<same password>@db:5432/bede
#   setup.sh asks which you want and wires this up for you either way.
#
#   Either way, the api container itself stays fully stateless — no local
#   volumes, no writable filesystem except /tmp for audio processing.

services:
  api:
    build:
      context: ./homeschool-api
      dockerfile: Dockerfile
    expose:
      - "8000"
    # `required: false` means this is a no-op when the local-db profile isn't
    # active (managed Postgres path) — api starts immediately either way.
    depends_on:
      db:
        condition: service_healthy
        required: false
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - MASTER_SECRET=${MASTER_SECRET:?MASTER_SECRET is required}
      - PARENT_PASSWORD=${PARENT_PASSWORD:?PARENT_PASSWORD is required}
      - CHILD_PIN=${CHILD_PIN:?CHILD_PIN is required}
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      # Optional — takes priority over Kokoro below when set. Meaningfully
      # more natural voice; see docs/VOICE_SETUP.md.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_TTS_MODEL=${OPENAI_TTS_MODEL:-gpt-4o-mini-tts}
      - OPENAI_TTS_VOICE=${OPENAI_TTS_VOICE:-fable}
      # Free, self-hosted fallback — only used when OPENAI_API_KEY is unset.
      - KOKORO_MODEL_DIR=${KOKORO_MODEL_DIR:-/app/models/kokoro}
      - KOKORO_VOICE=${KOKORO_VOICE:-bm_george}
      - KOKORO_SPEED=${KOKORO_SPEED:-1.0}
      # Optional — leave RESEND_API_KEY unset to disable the post-session
      # diagnostic email feature entirely. See docs/VOICE_SETUP.md's sibling,
      # services/email_service.py, for what this powers.
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_ADDRESS=${RESEND_FROM_ADDRESS:-Bede <bede@agnusdei.ai>}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://localhost,http://ui:80}
      - DISABLE_API_DOCS=true
      - PRODUCTION=true
    volumes:
      # Self-hosted Kokoro TTS model files — see docs/VOICE_SETUP.md. Read-only:
      # the app only ever reads them, never writes. Fine to leave the host
      # directory empty; voice output just falls back to the browser's own
      # speech until the files are placed there.
      - ./homeschool-api/models/kokoro:/app/models/kokoro:ro
    read_only: true                    # stateless container — all state in Postgres
    tmpfs:
      - /tmp:size=64m,mode=1777       # audio processing temp files only
    networks:
      - internal
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # Optional local Postgres — only starts when COMPOSE_PROFILES=local-db is
  # set in .env (setup.sh does this automatically if you choose local
  # Postgres during setup; see the "Storage model" note at the top of this
  # file). Zero external accounts, nothing leaves this machine — the
  # tradeoff is backups become your responsibility instead of a managed
  # provider's; see `make db-backup` / `make db-restore`.
  #
  # Not fully locked down like api/ui above (no cap_drop: ALL) — the
  # official Postgres image's own entrypoint needs broader capabilities to
  # initialize/manage its data directory (chown, etc.) on first run.
  db:
    image: postgres:16-alpine
    profiles: ["local-db"]
    environment:
      - POSTGRES_USER=sage
      # NOT `:?required` — Compose interpolates every declared service's
      # variables regardless of whether its profile is active, so a hard
      # requirement here would break `make start` for anyone NOT using
      # local-db. Postgres itself refuses to start with an empty password,
      # which is fine: this container is never actually started unless
      # COMPOSE_PROFILES=local-db, and setup.sh always sets a real value
      # together with that profile.
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-}
      - POSTGRES_DB=bede
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sage -d bede"]
      interval: 10s
      timeout: 5s
      retries: 5

  ui:
    build:
      context: ./homeschool-tutor
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      - api
    networks:
      - internal
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /var/cache/nginx:size=32m
      - /var/run:size=4m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # TLS termination — serves the entire pod over HTTPS (port 443)
  # Tablets and other LAN devices connect here. Run "make caddy-trust" once
  # per device to install the local root CA so there are no cert warnings.
  caddy:
    image: caddy:2-alpine
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    networks:
      - internal
    depends_on:
      - ui
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  caddy_data:     # persists Caddy's local CA and issued certs across restarts
  pgdata:         # local Postgres data — only used when COMPOSE_PROFILES=local-db

networks:
  internal:
    driver: bridge
    internal: false    # api needs outbound for Claude API + managed DB

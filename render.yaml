# Render Blueprint for Bede's PUBLIC DEMO backend ONLY.
#
# Do NOT use this for a family's real production instance — that should stay
# self-hosted on a LAN per CLAUDE.md's security model (voice biometrics,
# AES-256-GCM encrypted student data, tablet-only network exposure). This
# exists purely to give the demo's self-service "Get your own code" path (see
# demo/README.md) a real backend to talk to, without self-hosting a full
# Docker Compose stack just for a public, stateless demo.
#
# One-time setup — see docs/DEMO_HOSTING.md for the full walkthrough:
#   1. render.com -> New -> Blueprint -> connect this repo -> it reads this file.
#   2. Fill in every env var marked `sync: false` below from Render's
#      dashboard after the first deploy (Render deliberately won't let a
#      committed file set actual secrets).
#   3. Copy the resulting service URL (https://bede-demo-api-XXXX.onrender.com)
#      into this repo's Settings -> Secrets and variables -> Actions ->
#      Variables -> VITE_DEMO_API_BASE, then re-run the "Deploy demo to
#      GitHub Pages" workflow so the static demo picks it up.
#
# NOTE: written against Render's documented Blueprint spec
# (render.com/docs/blueprint-spec) but not validated against a live Render
# deploy from this sandbox (no network access to render.com here). If Render
# rejects a field name, check that page for the current schema — Blueprint
# parsing fails fast with a clear error rather than silently misconfiguring.

databases:
  - name: bede-demo-db
    plan: free
    databaseName: bede_demo
    user: bede

services:
  - type: web
    name: bede-demo-api
    runtime: docker
    plan: free
    rootDir: homeschool-api
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      # Render's Postgres gives a plain postgresql:// string — core/database.py
      # normalizes that to the +asyncpg driver scheme automatically, so this
      # can be wired straight through with no manual editing.
      - key: DATABASE_URL
        fromDatabase:
          name: bede-demo-db
          property: connectionString

      # Secrets — set these in Render's dashboard after the first deploy.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # Neither of these was ever declared here before — without them,
      # services/email_service.py's email_configured() is False, which
      # silently no-ops the post-session summary email, the distress alert,
      # AND the new beta feedback form below, regardless of FEEDBACK_EMAIL.
      # RESEND_FROM_ADDRESS must be a sender verified against a domain
      # you've added in Resend's dashboard, not just any address.
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_ADDRESS
        sync: false
      # This demo instance's parent/child roles are never advertised or used
      # at all — CHILD_PIN still must satisfy pin_is_strong() (see
      # core/config.py), so pick a real compliant PIN rather than a placeholder.
      - key: CHILD_PIN
        sync: false
      # No longer a credential anyone types — purely the on/off switch for
      # the whole public demo (empty = demo disabled). Still must satisfy
      # pin_is_strong() (6+ digits, no sequential run/repeated block/
      # palindrome) since core/config.py validates it the same way regardless.
      - key: DEMO_PIN
        sync: false

      # Auto-generated — random by design, nobody needs to remember these.
      - key: SECRET_KEY
        generateValue: true
      - key: MASTER_SECRET
        generateValue: true
      - key: PARENT_PASSWORD
        generateValue: true

      # Where beta CX/UX/content-quality feedback (POST /feedback, see
      # routers/feedback.py) is routed. Not a secret — just an inbox address —
      # but the feature stays inert either way until RESEND_API_KEY and
      # RESEND_FROM_ADDRESS are also set (dashboard, sync: false — neither is
      # configured on this Blueprint yet, see the note above about setting
      # secrets manually after the first deploy).
      - key: FEEDBACK_EMAIL
        value: info@agnusdei.ai

      # Fixed, non-secret settings.
      - key: DEMO_STUDENT_NAME
        value: Guest
      - key: DEMO_GRADE
        value: "4"
      - key: DEMO_GRADE_STAGE
        value: "3-5"
      # A browser's CORS Origin header is always scheme://host[:port] with
      # NO path — even though the demo itself is served from
      # https://agnusdei-ai.github.io/bede/, the Origin it sends is just
      # https://agnusdei-ai.github.io. Including the /bede path here would
      # never match, silently CORS-blocking every request from the demo.
      - key: CORS_ORIGINS
        value: https://agnusdei-ai.github.io
      - key: DISABLE_API_DOCS
        value: "true"
      - key: PRODUCTION
        value: "true"
      - key: OPENAI_TTS_MODEL
        value: gpt-4o-mini-tts
      - key: OPENAI_TTS_VOICE
        value: fable
